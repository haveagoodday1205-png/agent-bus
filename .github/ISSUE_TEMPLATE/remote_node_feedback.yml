name: First remote node feedback
description: Share where the Central/Edge setup worked or got rough.
title: "[Remote node]: "
labels: ["feedback", "setup", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: This form is for first Central/Edge setup feedback. Remove tokens, IPs, domains, SSH paths, private prompts, and model keys before posting.
  - type: dropdown
    id: stage
    attributes:
      label: Setup stage
      options:
        - Central setup
        - Pair code creation
        - Edge setup
        - Agent detection
        - Status or readiness
        - Room or run
        - Doctor or diagnostics
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What worked, what failed, or what felt unclear?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, install method, Node/Python versions, service manager, and whether Central and Edge are on one machine or two.
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Redacted doctor or diagnostics output
      description: Paste reviewed output from doctor or diagnostics bundle. Remove private data first.
      render: shell
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested UX improvement
      description: What should Agent Bus explain or automate next?
