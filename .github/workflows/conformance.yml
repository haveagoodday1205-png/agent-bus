name: conformance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Agent Bus protocol certification
        run: node scripts/protocol-conformance.mjs --json --artifact-dir conformance-artifacts
      - name: Validate certification result
        run: node scripts/verify-conformance-result-schema.mjs --artifact-dir conformance-artifacts
      - name: Publish job summary
        run: cat conformance-artifacts/agent-bus-conformance.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: agent-bus-conformance
          path: conformance-artifacts/
          if-no-files-found: error
