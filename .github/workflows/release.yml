name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  portable-bundles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Checks
        run: |
          node --check agent-bus.mjs
          node --check central-gateway.mjs
          node --check edge-node.mjs
          python -m py_compile central_gateway.py edge_node.py
          node smoke-test.mjs
      - name: Build portable bundle
        run: |
          echo "VERSION=$(node -p 'require("./package.json").version')" >> "$GITHUB_ENV"
          node scripts/make-portable-release.mjs
      - name: Archive
        run: |
          cd dist
          tar -czf "agent-bus-v${VERSION}-portable.tar.gz" "agent-bus-v${VERSION}-portable"
          zip -qr "agent-bus-v${VERSION}-portable.zip" "agent-bus-v${VERSION}-portable"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/agent-bus-v${VERSION}-portable.tar.gz" \
            "dist/agent-bus-v${VERSION}-portable.zip" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Agent Bus $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
