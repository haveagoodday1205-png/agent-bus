services:
  agent-bus-central:
    build: .
    image: agent-bus:local
    restart: unless-stopped
    init: true
    ports:
      - "8788:8788"
    environment:
      AGENT_BUS_HOST: 0.0.0.0
      AGENT_BUS_PORT: 8788
      AGENT_BUS_CONFIG: /config/central.config.json
      AGENT_BUS_CENTRAL_RUNTIME: python
      AGENT_BUS_DATA_DIR: /data/central
      AGENT_BUS_TOKEN: ${AGENT_BUS_TOKEN:-change-me}
      AGENT_BUS_MODEL_API_KEY: ${AGENT_BUS_MODEL_API_KEY:-}
      SUB2API_API_KEY: ${SUB2API_API_KEY:-}
      CLIPROXY_API_KEY: ${CLIPROXY_API_KEY:-}
    volumes:
      - ./central.config.json:/config/central.config.json:ro
      - agent-bus-data:/data
    command: ["serve", "--runtime", "python", "--config", "/config/central.config.json"]
    healthcheck:
      test: ["CMD", "node", "-e", "const port=process.env.AGENT_BUS_PORT||8788; fetch('http://127.0.0.1:'+port+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true

volumes:
  agent-bus-data:
