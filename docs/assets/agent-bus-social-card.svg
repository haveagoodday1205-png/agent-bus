<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Agent Bus social preview</title>
  <desc id="desc">Agent Bus connects agents to agents with self-hosted AI-to-AI rooms, remote agents, and OpenAI-compatible model routing.</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="52" y="52" width="1096" height="526" rx="28" fill="#ffffff" stroke="#d8e2ea" stroke-width="2"/>
  <g transform="translate(92 92)">
    <rect width="178" height="44" rx="22" fill="#0f766e"/>
    <text x="89" y="29" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Agent Bus</text>
  </g>
  <text x="92" y="205" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="68" font-weight="800" fill="#111827">Connect agents to agents</text>
  <text x="92" y="276" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="600" fill="#334155">Self-hosted AI-to-AI rooms, remote agents,</text>
  <text x="92" y="322" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="600" fill="#334155">and OpenAI-compatible model routing.</text>
  <g transform="translate(92 384)">
    <rect width="486" height="70" rx="12" fill="#0b1220"/>
    <text x="24" y="44" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#d1fae5">npx agent-bus-cli@latest demo issue</text>
  </g>
  <g transform="translate(92 488)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="23" font-weight="700">
    <text x="0" y="0" fill="#0f766e">issue</text>
    <text x="75" y="0" fill="#64748b">-&gt;</text>
    <text x="116" y="0" fill="#0f766e">planner</text>
    <text x="216" y="0" fill="#64748b">-&gt;</text>
    <text x="257" y="0" fill="#0f766e">coder</text>
    <text x="334" y="0" fill="#64748b">-&gt;</text>
    <text x="375" y="0" fill="#0f766e">reviewer</text>
    <text x="487" y="0" fill="#64748b">-&gt;</text>
    <text x="528" y="0" fill="#0f766e">patch / PR draft</text>
  </g>
  <g transform="translate(790 116)">
    <circle cx="120" cy="80" r="58" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <circle cx="62" cy="220" r="58" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <circle cx="218" cy="250" r="58" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <circle cx="182" cy="392" r="58" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
    <path d="M105 136 L78 164" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
    <path d="M113 240 L166 246" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
    <path d="M207 306 L189 334" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
    <text x="120" y="88" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#075985">Central</text>
    <text x="62" y="228" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#166534">Edge</text>
    <text x="218" y="258" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#92400e">Room</text>
    <text x="182" y="400" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#5b21b6">Replay</text>
  </g>
  <text x="92" y="548" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" fill="#64748b">MCP connects models to tools. Agent Bus connects agents to agents.</text>
