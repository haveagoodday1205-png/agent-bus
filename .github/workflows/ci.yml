name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax check JavaScript
        run: |
          node --check agent-bus.mjs
          node --check central-gateway.mjs
          node --check edge-node.mjs
          node --check mock-openai-backend.mjs
          node --check windows-openai-proxy.mjs
          node --check scripts/demo-local.mjs
          node --check scripts/make-portable-release.mjs
          node --check scripts/offline-smoke.mjs
      - name: Syntax check Python
        run: python -m py_compile central_gateway.py edge_node.py
      - name: Validate JSON examples
        run: |
          node -e "for (const f of ['package.json','central.config.example.json','edge.config.example.json','edge.120.example.json','edge.178.example.json','edge.hk.example.json']) JSON.parse(require('fs').readFileSync(f, 'utf8'));"
      - name: Agent wrapper smoke
        run: |
          bash -n scripts/hermes-agent-bus.sh scripts/openclaw-agent-bus.sh
          tmpdir="$(mktemp -d)"
          printf '%s\n' 'import definitely_missing_agent_bus_test_dependency' > "$tmpdir/cli.py"
          output="$(AGENT_MESSAGE='hello' AGENT_SESSION_ID='room-1' HERMES_AGENT_ROOT="$tmpdir" HERMES_COMMAND=/bin/echo scripts/hermes-agent-bus.sh 2>&1)"
          printf '%s\n' "$output"
          grep -F "falling back to the hermes CLI command" <<<"$output"
          grep -F "chat -q hello -Q" <<<"$output"
      - name: CLI smoke
        run: |
          node agent-bus.mjs --help
          node agent-bus.mjs init edge --preset echo --out /tmp/edge.config.json
          node agent-bus.mjs service systemd --mode edge --config /opt/agent-bus/edge.config.json --cwd /opt/agent-bus --agent-bus-path /usr/bin/agent-bus >/tmp/agent-bus-edge.service
          node agent-bus.mjs doctor --config /tmp/edge.config.json || true
          node agent-bus.mjs probe --config /tmp/edge.config.json
      - name: Offline room smoke
        run: npm run smoke:offline -- --json
      - name: Full smoke
        run: npm run smoke
