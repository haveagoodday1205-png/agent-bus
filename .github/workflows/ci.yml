name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax check JavaScript
        run: |
          node --check agent-bus.mjs
          node --check central-gateway.mjs
          node --check edge-node.mjs
          node --check mock-openai-backend.mjs
          node --check windows-openai-proxy.mjs
          node --check scripts/demo-local.mjs
          node --check scripts/demo-room.mjs
          node --check scripts/compatibility-smoke.mjs
          node --check scripts/make-portable-release.mjs
          node --check scripts/npm-install-smoke.mjs
          node --check scripts/offline-smoke.mjs
          node --check scripts/verify-protocol-v1.mjs
          node --check scripts/release-check.mjs
          node --check scripts/release-notes.mjs
          node --check scripts/release-preflight.mjs
      - name: Syntax check Python
        run: python -m py_compile central_gateway.py edge_node.py
      - name: Validate JSON examples
        run: |
          node -e "for (const f of ['package.json','central.config.example.json','edge.config.example.json','edge.120.example.json','edge.178.example.json','edge.hk.example.json']) JSON.parse(require('fs').readFileSync(f, 'utf8'));"
      - name: Agent wrapper smoke
        run: |
          bash -n scripts/hermes-agent-bus.sh scripts/openclaw-agent-bus.sh
          tmpdir="$(mktemp -d)"
          printf '%s\n' 'import definitely_missing_agent_bus_test_dependency' > "$tmpdir/cli.py"
          output="$(AGENT_MESSAGE='hello' AGENT_SESSION_ID='room-1' HERMES_AGENT_ROOT="$tmpdir" HERMES_COMMAND=/bin/echo scripts/hermes-agent-bus.sh 2>&1)"
          printf '%s\n' "$output"
          grep -F "falling back to the hermes CLI command" <<<"$output"
          grep -F "chat -q hello -Q" <<<"$output"
          mkdir -p "$tmpdir/bin" "$tmpdir/tmp/.openclaw/agents/agent-bus/sessions"
          cat > "$tmpdir/bin/openclaw" <<'SH'
          #!/usr/bin/env bash
          printf '%s\n' '{"result":{"payloads":[{"text":"REPORT: fake openclaw ok\nDONE"}]}}'
          SH
          chmod +x "$tmpdir/bin/openclaw"
          printf 'oversized-session-file' > "$tmpdir/tmp/.openclaw/agents/agent-bus/sessions/room-1.jsonl"
          output="$(env -u HOME PATH="$tmpdir/bin:$PATH" TMPDIR="$tmpdir/tmp" OPENCLAW_AGENT_ID=agent-bus AGENT_MESSAGE='hello' AGENT_SESSION_ID='room-1' OPENCLAW_AGENT_BUS_MAX_SESSION_BYTES=1 bash scripts/openclaw-agent-bus.sh 2>&1)"
          printf '%s\n' "$output"
          grep -F "fake openclaw ok" <<<"$output"
          test -f "$tmpdir/tmp/.openclaw/agents/agent-bus/sessions/room-1.jsonl.bak-agent-bus-pruned-"*
      - name: CLI smoke
        run: |
          node agent-bus.mjs --help
          node agent-bus.mjs init edge --preset echo --out /tmp/edge.config.json
          node agent-bus.mjs service systemd --mode edge --config /opt/agent-bus/edge.config.json --cwd /opt/agent-bus --agent-bus-path /usr/bin/agent-bus >/tmp/agent-bus-edge.service
          node agent-bus.mjs doctor --config /tmp/edge.config.json || true
          node agent-bus.mjs probe --config /tmp/edge.config.json
      - name: NPM package smoke
        run: npm run pack:check
      - name: Portable release smoke
        run: npm run portable:check
      - name: Protocol v1 check
        run: npm run protocol:check
      - name: Hello-agent compatibility smoke
        run: npm run compat:check -- --json
      - name: Offline room smoke
        run: npm run smoke:offline -- --json
      - name: Full smoke
        run: npm run smoke

  compatibility:
    name: compatibility (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax checks
        run: |
          node --check scripts/compatibility-smoke.mjs
          node --check examples/hello-agent/hello-agent.mjs
      - name: Protocol v1 check
        run: npm run protocol:check
      - name: No-quota compatibility smoke
        run: npm run compat:check -- --json
