name: Bug report
description: Report something that is broken or surprising.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping make Agent Bus more reliable.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps someone else can run without private credentials.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node/Python version, install method, central or edge mode.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics bundle
      description: If possible, run `agent-bus diagnostics bundle --config edge.config.json --out diagnostics.json` and paste the redacted summary or attach the reviewed file. Do not include private hosts/paths unless this is a private support channel.
      render: json
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Remove tokens, API keys, IPs, domains, SSH paths, and private prompts before posting.
      render: shell
