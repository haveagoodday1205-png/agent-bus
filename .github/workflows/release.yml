name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  portable-bundles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Checks
        run: |
          npm run release:check
          npm run portable:check:zip
          node smoke-test.mjs
      - name: Build portable bundle
        run: |
          echo "VERSION=$(node -p 'require("./package.json").version')" >> "$GITHUB_ENV"
          node scripts/make-portable-release.mjs --archive
      - name: Smoke built portable bundle
        run: |
          ./dist/agent-bus-v${VERSION}-portable/agent-bus --help
          ./dist/agent-bus-v${VERSION}-portable/agent-bus smoke --offline --json
          test -s "dist/agent-bus-v${VERSION}-portable.tar.gz"
          test -s "dist/agent-bus-v${VERSION}-portable.zip"
          test -s "dist/agent-bus-v${VERSION}-portable.manifest.json"
          test -s dist/SHA256SUMS
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/agent-bus-v${VERSION}-portable.tar.gz" \
            "dist/agent-bus-v${VERSION}-portable.zip" \
            "dist/agent-bus-v${VERSION}-portable.manifest.json" \
            "dist/SHA256SUMS" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Agent Bus $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
